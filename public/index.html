<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border: 1px solid #ddd;
            padding: 24px;
        }

        h1 {
            margin: 0 0 20px;
            text-align: center;
            font-size: 24px;
            color: #222;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #222;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #999;
        }

        .hint {
            font-size: 12px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #222;
            background: #222;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>URL Shortener</h1>

        <form action="/api/v1/shortner" method="post">
            <div class="form-group">
                <label for="originalUrl">Original URL</label>
                <input type="url" id="originalUrl" name="originalUrl" placeholder="https://example.com" required />
            </div>

            <div class="form-group">
                <label for="customUrl">Custom Short URL</label>
                <input type="text" id="customUrl" name="customUrl" placeholder="Optional" />
                <div class="hint">Leave empty if you do not want a custom URL.</div>
            </div>

            <button type="submit">Shorten URL</button>
        </form>
    </div>
</body>

</html>
